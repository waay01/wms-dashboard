services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wms_logs
      POSTGRES_USER: wms
      POSTGRES_PASSWORD: wms_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wms -d wms_logs"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://wms:wms_secret@postgres:5432/wms_logs
      LOGS_PATH: /logs
    volumes:
      - ./logs:/logs:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
